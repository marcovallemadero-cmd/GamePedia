<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepedia: Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(79, 70, 229, 0.12) 0%, transparent 70%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [selectedGame, setSelectedGame] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [homeContent, setHomeContent] = useState({ title: "Cargando...", description: "", bgImage: "" });
            const [games, setGames] = useState([]);

            // CARGA DE DATOS DESDE GITHUB (CMS)
            useEffect(() => {
                // Cargar Configuración de Home
                fetch('./data/home.json')
                    .then(res => res.json())
                    .then(data => setHomeContent(data))
                    .catch(() => setHomeContent({title: "Bienvenido", description: "Configura el CMS para ver contenido", bgImage: ""}));

                // Cargar Listado de Juegos (Generado por el CMS)
                fetch('./data/games-index.json')
                    .then(res => res.json())
                    .then(data => setGames(data))
                    .catch(() => console.log("No hay juegos aún"));
            }, []);

            const filteredGames = games.filter(g => g.title.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="min-h-screen relative bg-slate-950">
                    {view === 'home' && (
                        <div className="absolute inset-0 bg-cover bg-center opacity-30 transition-opacity duration-1000"
                             style={{ backgroundImage: `url('${homeContent.bgImage}')` }} />
                    )}
                    <div className="absolute inset-0 hero-gradient pointer-events-none" />

                    <nav className="fixed top-0 left-0 right-0 z-40 glass border-b border-white/5 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('home'); setSelectedGame(null);}}>
                                <div className="bg-indigo-600 p-2 rounded-xl text-white"><Icon name="gamepad-2" /></div>
                                <h1 className="text-xl font-black italic uppercase">GAMEPEDIA</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => {setView('home'); setSelectedGame(null);}} className={`p-2 rounded-xl ${view === 'home' ? 'text-indigo-400 bg-indigo-500/10' : 'text-slate-400'}`}><Icon name="home" /></button>
                                <button onClick={() => {setView('catalog'); setSelectedGame(null);}} className={`p-2 rounded-xl ${view === 'catalog' ? 'text-indigo-400 bg-indigo-500/10' : 'text-slate-400'}`}><Icon name="layout-grid" /></button>
                                <a href="/admin/" className="text-[10px] font-bold text-slate-500 hover:text-white border border-slate-800 px-3 py-1 rounded-lg transition">ADMIN CMS</a>
                            </div>
                        </div>
                    </nav>

                    <main className="pt-32 pb-20 px-6 max-w-7xl mx-auto relative z-10">
                        {view === 'home' ? (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-12">
                                <div className="space-y-4">
                                    <h2 className="text-6xl md:text-8xl font-black italic uppercase bg-gradient-to-b from-white to-slate-500 bg-clip-text text-transparent">{homeContent.title}</h2>
                                    <p className="text-xl text-slate-400 max-w-2xl mx-auto">{homeContent.description}</p>
                                </div>
                                <div className="w-full max-w-2xl space-y-8">
                                    <div className="relative group">
                                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-500" />
                                        <input type="text" placeholder="Busca un videojuego..." value={searchTerm} onChange={(e) => {setSearchTerm(e.target.value); if (e.target.value.length > 0) setView('catalog');}}
                                               className="w-full bg-slate-900/60 border border-white/10 rounded-[2rem] py-6 pl-16 pr-8 text-white outline-none focus:border-indigo-500/50" />
                                    </div>
                                    <button onClick={() => setView('catalog')} className="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-6 rounded-[2rem] font-black uppercase tracking-widest transition-all">ENTRAR AL CATÁLOGO</button>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {filteredGames.map(game => (
                                    <div key={game.id} onClick={() => setSelectedGame(game)} className="game-card group relative aspect-[3/4] rounded-[2.5rem] overflow-hidden bg-slate-900 border border-white/5 cursor-pointer shadow-2xl">
                                        <img src={game.cover} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700" alt={game.title} />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent" />
                                        <div className="absolute bottom-6 left-6 right-6">
                                            <span className="text-[10px] font-black text-indigo-400 uppercase">{game.year}</span>
                                            <h3 className="text-xl font-bold text-white italic truncate">{game.title}</h3>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal de Detalle (Solo Lectura) */}
                    {selectedGame && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-md" onClick={() => setSelectedGame(null)} />
                            <div className="relative w-full max-w-6xl max-h-[92vh] glass border border-white/10 rounded-[3rem] overflow-hidden flex flex-col md:flex-row shadow-2xl">
                                <div className="w-full md:w-5/12 h-64 md:h-auto"><img src={selectedGame.cover} className="w-full h-full object-cover" /></div>
                                <div className="flex-1 p-8 md:p-12 overflow-y-auto custom-scrollbar space-y-10 text-white">
                                    <div className="flex justify-between items-start">
                                        <div className="space-y-3">
                                            <h2 className="text-4xl md:text-5xl font-black italic uppercase leading-tight">{selectedGame.title}</h2>
                                            <div className="flex gap-4 text-xs font-bold text-slate-500 uppercase">
                                                <span>{selectedGame.year}</span> • <span>{selectedGame.developer}</span>
                                            </div>
                                        </div>
                                        <button onClick={() => setSelectedGame(null)} className="p-2 text-slate-400"><Icon name="x" size={24}/></button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Descripción</h4>
                                            <p className="text-slate-300 italic">{selectedGame.description}</p>
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Requisitos</h4>
                                            <div className="bg-slate-900/40 p-4 rounded-2xl border border-white/5 text-sm text-slate-400">{selectedGame.systemRequirements}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
